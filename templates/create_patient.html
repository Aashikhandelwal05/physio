{% extends "base.html" %}

{% block title %}New Patient — Balaji Neurophysiotherapy{% endblock %}

{% block content %}
<div style="max-width: 520px; margin: 1rem auto;">
    <div class="card" style="border: none; box-shadow: var(--shadow-lg);">
        <div class="section-bar" style="background: linear-gradient(135deg, var(--success), var(--success-dark));">
            ＋ Create New Patient
        </div>
        <div class="card-body" style="padding: 1.5rem;">
            {% if error %}
            <div class="alert alert-danger">
                ⚠ {{ error }}
                <button class="alert-close">&times;</button>
            </div>
            {% endif %}

            <form method="post" action="/patient/new">
                <div class="form-group">
                    <label class="form-label">Name <span class="required">*</span></label>
                    <input type="text" class="form-input" name="name" value="{{ prefill_name or name or '' }}" required
                        minlength="2" maxlength="100" placeholder="Patient full name">
                    <small class="form-hint">At least 2 characters</small>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone <span class="required">*</span></label>
                    <input type="tel" class="form-input" name="phone" value="{{ phone or '' }}" required
                        pattern="[0-9]{10}" maxlength="10" minlength="10" placeholder="10-digit number"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    <small class="form-hint">Exactly 10 digits — used as unique identifier</small>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-input" name="age" value="{{ age or '' }}" min="1" max="120"
                            placeholder="—">
                    </div>
                    <div class="form-group flex-1">
                        <label class="form-label">Gender</label>
                        <select class="form-input" name="gender">
                            <option value="">— Select —</option>
                            <option value="Male" {% if gender=='Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if gender=='Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if gender=='Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Notes</label>
                    <textarea class="form-input" name="notes" rows="3" maxlength="500"
                        placeholder="Medical history, allergies, etc.">{{ notes or '' }}</textarea>
                </div>

                <button type="submit" class="btn btn-success btn-lg btn-block mb-sm">Create Patient</button>
                <a href="/" class="btn btn-ghost btn-block">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
